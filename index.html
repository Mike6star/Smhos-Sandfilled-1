<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Salvation Ministries Sandfilled 1 — Home of Success</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- ─── PRELOAD BACKGROUND IMAGES (Performance Improvement) ─── -->
    <link rel="preload" as="image" href="assets\Background Images\building overview.jpg" />
    <link rel="preload" as="image" href="assets\Background Images\Crusade Crowd 2.jpg" />
    <link rel="preload" as="image" href="assets\Background Images\Crusade Crowd.jpg" />
    <link rel="preload" as="image" href="assets\Background Images\church 1.jpg" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ─── BACKGROUND IMAGE SLIDER ─── -->
    <div class="bg-slider">
        <div class="slide-active" style="background-image: url('assets\Background Images\building overview.jpg');"></div>
        <div class="slide" style="background-image: url('assets\Background Images\Crusade Crowd 2.jpg');"></div>
        <div class="slide" style="background-image: url('assets\Background Images\Crusade Crowd.jpg');"></div>
        <div class="slide" style="background-image: url('assets\Background Images\church 1.jpg');"></div>
    </div>

    <!-- Ambient Coral Orbs -->
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>

    <!-- ─── FIREFLIES CONTAINER ─── -->
    <div class="fireflies-container" id="fireflies"></div>

    <!-- ─── MAIN LANDING ─── -->
    <main class="landing">

        <!-- LOGO -->
        <div class="church-logo">
            <img src="assets/Transparent Logo.png" alt="Salvation Ministries Sandfilled 1 Logo" />
        </div>

        <!-- Church Name -->
        <h1 class="church-name">
            Salvation Ministries <span class="highlight">Sandfilled 1</span>
        </h1>

        <!-- Motto -->
        <p class="motto">
            <i class="fas fa-arrow-right" style="font-size:0.5rem; margin-right:0.4rem; opacity:0.5;"></i>
            Home of Success
            <i class="fas fa-arrow-left" style="font-size:0.5rem; margin-left:0.4rem; opacity:0.5;"></i>
        </p>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Welcome -->
        <p class="welcome-text">
            Welcome to <strong>Salvation Ministries Sandfilled 1</strong> — the <strong>Home of Success</strong>.<br />
            Connect with our community on <strong>WhatsApp</strong> or follow us on <strong>Facebook</strong>.
        </p>

        <!-- Action Buttons -->
        <div class="actions">
            <!-- WhatsApp -->
            <a href="https://chat.whatsapp.com/GbHiOU6htGLB6ANzeLJQ9B" target="_blank" rel="noopener noreferrer" class="btn btn--whatsapp">
                <i class="fab fa-whatsapp"></i>
                <span>Join WhatsApp</span>
            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/share/1ESajBVNAK/" target="_blank" rel="noopener noreferrer" class="btn btn--facebook">
                <i class="fab fa-facebook-f"></i>
                <span>Visit Facebook</span>
            </a>
        </div>

        <!-- Footer -->
        <div class="footer-note">
            <span>✝︎</span>
            <span class="dot"></span>
            <span>Salvation Ministries Sandfilled 1 &bull; 2026</span>
            <span class="dot"></span>
            <span>
                <i class="fas fa-heart" style="color: rgba(0, 180, 216, 0.15); font-size:0.5rem;"></i>
            </span>
        </div>

    </main>

<script src="script.js"></script>
</body>
</html>
